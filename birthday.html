<!DOCTYPE html>
<html>
<head>

<style>

.container {

</head>

<body>

<div class="container">

    <p>You became my happiness, my safe place 🥺</p>

    
    <img src="me&him.jpeg" alt="Our Memory">

    <p>I fall for you again and again every day 💞</p>
    <h2>Happy Birthday spiderman ❤️ luv yewww paiyaww</h2>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("content").classList.remove("hidden");
}
</script>

</body>
</html>
